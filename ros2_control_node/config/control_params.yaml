# ============================================================================
#  control_params.yaml  —  control_node 런타임 파라미터
#  (코드 기본값은 include/control_node/params.hpp — 두 파일 값을 일치시킬 것)
#
#  ★★ 안전 한계 블록(맨 아래 주석 아님, 바로 아래 첫 블록)만 보면 됨 ★★
#  실주행 튜닝 순서: ① 안전 한계 확인 → ② kp (kd=0) → ③ 출렁이면 kd
# ============================================================================
control_node:
  ros__parameters:
    # ========================================================================
    # ★안전 한계 — 제일 먼저/자주 만질 값. 발행 직전 최종 클램프로도 강제됨
    #  (applySafetyLimits: 어떤 모드/버그도 이 값을 절대 못 넘음)
    # ========================================================================
    v_max: 0.15             # m/s, 몸체 평면속도 상한 (벡터 크기) [0625 0.12→0.15 조금 과감]
                            #  더 느리게=↓ / 빠르게=↑ (전류·발열 확인).
    w_body_max: 0.5         # rad/s, 몸체 각속도 상한 [0625 0.4→0.5: 옆이동 추종 더 빠르게]
    body_accel_max: 0.5     # m/s^2, 평면 가속 상한 (슬루) [0625 0.3→0.5 출발 반응 빠르게]
    yaw_accel_max: 1.3      # rad/s^2, 각가속 상한 (슬루) [0625 0.8→1.3 회전 출발 빠르게]
    w_top_max: 1.5          # rad/s, 상단yaw 목표각 변화율 상한 (스텝 보호)
    top_lead_max: 0.8       # rad, 상단yaw 목표가 실측각보다 앞설 최대 리드
                            # (드라이버 지연/정지 시 목표 폭주 방지. 0 이하=비활성)

    # ----- 상단 yaw 게인 (카메라 락온; 스텝=위치 명령) -----
    kp_yaw: 0.7             # azimuth → 목표각 보정 게인 (position모드 전용)
    az_dead: 0.15           # rad, azimuth 불감대 (이 안이면 상단yaw 정지)
                            #  ★펄스 제어용으로 더 넓힘(0.10→0.15≈±8.6°). 1펄스(~13°)와 비슷.
                            #  더 둔감=↑ / 더 민감=↓ (멈췄다 돌았다 떨리면 더 키울 것)
    yaw_velocity_mode: true # ★현 펌웨어=velocity(방향)모드. top_yaw_target 부호=회전방향
    top_yaw_sign: 1.0       # 회전 방향이 실제와 반대면 -1.0 (실차 확인 후 보정)
    # ----- 상단 yaw 펄스 제어 (모터 거칠어서 톡톡 끊어 명령) -----
    yaw_pulse_mode: true    # true=펄스(권장) / false=연속(구 동작)
    yaw_pulse_period: 0.5   # s, 펄스 간격(depth_scale=false 일 때만 사용)
    yaw_pulse_sec: 0.08     # s, 1회 펄스 최대 길이(멀 때) [0625 0.06→0.08 한 번에 더 많이]
    yaw_pulse_min: 0.025    # s, 1회 펄스 최소 길이(중앙 근처) [0625 비례펄스: 헌팅없이 정착]
    # ----- 거리 의존(가까울수록 주기 길게=느리게 + 데드존 크게) -----
    yaw_depth_scale: true   # false면 위 고정 yaw_pulse_period / az_dead 사용
    yaw_near_dist: 1.0      # m, 이하 = 가까움
    yaw_far_dist: 3.0       # m, 이상 = 멈
    yaw_period_near: 2.2    # s, 가까울 때 주기 [0623 3.0→2.2: 근거리 더 과감]
    yaw_period_far: 1.2     # s, 멀 때 주기 [0623 1.0→1.2 조금 늦춤]
    az_dead_near: 0.20      # rad, 가까울 때 데드존 [0625 0.28→0.20(≈11.5°) 2.Wheel 추종 ↑]
    az_dead_far: 0.13       # rad, 멀 때 데드존(≈7.4°) [0625 0.18→0.13]
    # ----- 상단 yaw 케이블 꼬임 방어 (시간기반 데드레코닝) -----
    yaw_time_limit: 1.0e9   # s, 한 방향 누적 한계 [0625 사실상 무제한 — 케이블 수동 조율. 켜려면 작게]
    yaw_time_warn: 1.0e9    # s, 한계 근접 경고(무제한이라 사실상 비활성)
    top_yaw_speed: 1.75     # rad/s, 스테이지 회전속도 [0625 →1.75: 1.8s≈180° 실측]. 폴백용
    # (구·미사용) 각도기반 가드 — 시간기반으로 대체됨
    top_yaw_limit: 1.5708
    top_yaw_limit_pos: 0.0995
    top_yaw_limit_neg: 0.0698

    # ----- 몸체 위치 게인 (선분 끝점 추종, PD) -----
    kp_pos: 0.4             # 위치오차[m] → 속도[m/s] (P) [0623 →0.4 더 부드럽게]
    kd_pos: 0.30            # 오차 변화율 감쇠 (D) [0623 0.15→0.30 위치 오버슈트 감쇠]
                            # ★실주행: 0에서 시작, 출렁이면 올리기. 노이즈 크면 떨림 주의
    pos_dead: 0.20          # m, 위치 불감대 (이 안의 오차는 무시→정지).
                            #  [0625 0.30→0.20 회전 추종 더 잘되게 민감↑]
                            #  더 둔감: 키우기 / 더 민감: 줄이기.

    # ----- 몸체 yaw 게인 (글로벌 헤딩 유지, PD; 모드1·모드2 공용) -----
    kp_byaw: 0.50           # yaw오차[rad] → 각속도[rad/s] (P) [0625 0.30→0.50 회전 추종 과감
                            #  (주인 옆이동 시 화면 안에 더 빨리 붙잡게)]
    kd_byaw: 0.30           # yaw 감쇠 (D) [0623 →0.30 오버슈트 감쇠 강화]
    byaw_dead: 0.07         # rad, yaw 불감대 [0625 0.10→0.07(±4°) 회전 추종 더 민감]
    face_owner: true        # true=로봇 정면이 주인 향함 (+heading_offset 가산)

    # ----- 선분 기본값 (진입 시 캡처되나, 추정 실패 시 폴백값) -----
    seg_distance: 1.5       # m, 유지할 거리 D 기본값
    seg_d_min: 0.5          # m, 손동작 조정 하한 (engage 캡처엔 미적용)
    seg_d_max: 3.0          # m, 손동작 조정 상한

    # ----- 모드3 FOLLOW2 (leash): 거리만 유지, 구도/odom 불필요 -----
    leash_distance: 1.5     # m, 유지할 목표 거리
    leash_dead: 0.7         # m, 슬랙(거리+이 값 넘을 때만 끌려감) [0623 0.5→0.7 더 둔감]
    kp_leash: 0.6           # 거리오차[m] → 속도[m/s] (P)

    # ----- 모드4 ORBIT (공전): 반지름 유지하며 천천히 돌기 -----
    orbit_speed: 0.10       # m/s, 접선(공전) 속도 — ★천천히 [0623 0.15→0.10]
    orbit_ccw: true         # true=반시계(CCW) 기본
    kp_orbit_r: 0.5         # 반지름 오차[m] → 반경속도[m/s] (P)

    # ----- 리프트 (스텝, 시간기반: 손동작 동안만 방향대로 이동) -----
    z_min: 0.0              # m, 행정 하한 (내림 명령 목표)
    z_max: 0.5              # m, 행정 상한 (올림 명령 목표)
    lift_default: 0.0       # m, (미사용 — 시간기반 전환)
    lift_invert: true       # ★올림/내림 실차 확인=반대라 true (재빌드 없이 yaml로 보정)

    # ----- 상단 yaw 언와인딩 (지금은 자리만, 사실상 무한) -----
    theta_soft_max: 1.0e9   # rad (나중에 ~11.3 = 1.8바퀴 정도로 축소)

    # ----- 장애물 회피 -----
    obstacle_avoidance: true
    obstacle_stop_dist: 0.20   # m (이하면 그 방향 완전 차단)
    obstacle_slow_dist: 0.60   # m (이 거리부터 감속 시작)

    # ----- 모드/주기/안전 -----
    mode: 0                 # 시작 모드 (0=IDLE 1=FOLLOW 2=ROTATE). supervisor가 바꿈
    freeze_owner: false     # false=실시간 주인 추종(졸졸 따라감, 기본·권장).
                            #  true=모드확정 순간 위치 고정(안 따라감, 정지구도용)

    camera_latency: 0.0     # s, 카메라 지연 보상. ★기본 0=꺼짐.
                            # 회전 중 주인 추정이 끌리면 0.05~0.15 시도, 반대로 가면 0
    ctrl_rate: 50.0         # Hz
    lift_cmd_timeout: 0.3   # s, 리프트 손동작 끊기면 이 시간 뒤 정지(시간기반)
    wheel_cmd_timeout: 0.4  # s, 메뉴 중 휠 명령(거리/공전/팬) 끊기면 이 시간 뒤 몸체 정지
    yaw_zero_cooldown: 3.0  # s, rock_on 으로 OAK 0점 지정 직후 상단yaw 정지 유지 시간
    owner_timeout: 0.5      # s
    odom_timeout: 0.5       # s
    proximity_timeout: 0.3  # s
    teleop_timeout: 0.5     # s, /teleop_cmd 끊김 판정 (모드0 → 정지)
