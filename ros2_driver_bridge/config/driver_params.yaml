# ============================================================================
#  driver_params.yaml — driver_bridge 런타임 파라미터
#
#  ★ 실기 브링업 전 반드시 확인할 값:
#    1) port           : Jetson에서 STM32가 잡히는 장치
#    2) encoder_cpr     : 휠 1회전당 엔코더 카운트 (실측 캘리브 필수!)
#    3) encoder_order/signs : 엔코더↔휠 매핑·부호 (한 바퀴씩 돌려보고 확정)
#    4) wheel_radius/lx/ly   : 펌웨어 WHEEL_R/LX/LY 와 동일하게
# ============================================================================
driver_bridge:
  ros__parameters:
    # ----- 시리얼 -----
    port: /dev/ttyUSB0       # USB-시리얼. Jetson 40핀 UART면 /dev/ttyTHS1
    baud: 115200             # 펌웨어 USART1 고정
    mock: false              # true면 시리얼 없이 로직만(오프라인 테스트)

    # ----- 차체 기구 (펌웨어 main.c #define 과 일치시킬 것) -----
    wheel_radius: 0.05       # m   (WHEEL_R)
    wheel_lx: 0.36           # m   (WHEEL_LX, 좌우 거리 절반)
    wheel_ly: 0.26           # m   (WHEEL_LY, 전후 거리 절반)

    # ----- 엔코더 → 오도메트리 -----
    # ★PLACEHOLDER. JGB37-520 기준 (PPR × 4(쿼드) × 기어비). 실측 후 교체!
    #   예) 11 PPR × 4 × 30:1 = 1320. 기어비 다르면 값도 다름.
    encoder_cpr: 7410.0           # [0623 실측] 1회전≈7410 카운트(8측정 평균). (구 1320=틀림)
    encoder_order: [0, 1, 2, 3]   # 수신 enc1..4 → 휠 [FL, FR, RL, RR]
    encoder_signs: [1, -1, 1, -1] # [0623 실측] 전진 시 e2/e4가 −라 반전 → 4개 모두 + 되게

    # ----- 발행/통신 -----
    tx_rate: 50.0            # Hz, STM32로 명령 송신(하트비트)
    cmd_timeout: 0.3         # s, /control_cmd 끊기면 0속도 송신
    publish_odom: true
    odom_frame: odom
    base_frame: base_link
    verify_rx_checksum: true # 체크섬 깨진 상태프레임 버림 (binary 모드 전용)
    # STM 상태(엔코더) 포맷. 현 보드 펌웨어=ascii("e1,e2,e3,e4\n").
    #   repo driver_firmware(0xBB 19B) 구우면 binary 로 바꿀 것.
    status_format: ascii    # ascii | binary

    # ----- 몸체속도 폐루프 보정 (엔코더 피드백) -----
    #  펌웨어 휠 제어가 개루프 PWM이라 측면/자전/대각선에서 언더드라이브/드리프트
    #  발생. firmware 가 per-wheel 명령을 못 받으므로, 엔코더 정기구학 실측
    #  (vx,vy,wz)와 지령 오차를 PI(+피드포워드)로 메워 보낼 (vx,vy,wz)를 보정한다.
    #
    #  ★켜기 전 필수: ① encoder_cpr 실측 캘리브 ② encoder_signs 확인
    #    → 전진/측면/자전 시 /odom twist 가 실제 방향·크기와 맞는지 확인한 뒤
    #    wheel_fb_enable: true 로. (실측이 틀리면 오히려 악화됨)
    wheel_fb_enable: false   # ★캘리브 끝나면 true
    wheel_fb_kp: 0.4         # 비례(작게)
    wheel_fb_ki: 1.2         # 적분[1/s] — 정상상태 스케일오차 제거 주역
    wheel_fb_corr_v: 0.15    # m/s, 선속도 축당 최대 보정량
    wheel_fb_corr_w: 0.6     # rad/s, 각속도 최대 보정량
    wheel_fb_out_v: 0.40     # m/s, 보정 후 선속도 벡터크기 상한(=펌웨어 V_MAX)
    wheel_fb_out_w: 2.0      # rad/s, 보정 후 각속도 상한
    wheel_fb_min_cmd: 0.02   # 이하 지령은 0취급(적분 리셋·보정 안 함)
    wheel_fb_meas_timeout: 0.2  # s, 엔코더 실측 끊기면 보정 중단(피드포워드만)
