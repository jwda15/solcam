tracking_node:
  ros__parameters:

    # --------------------------------------------------------
    # 카메라 해상도
    # --------------------------------------------------------
    image_width:  512   # [0525] OAK preview(=NN 입력 512x384)와 일치시킬 것.
    image_height: 384   #        owner 초기화 시 "화면 중앙" 기준이 어긋나지 않게.

    # --------------------------------------------------------
    # ByteTrack 트래킹 파라미터
    # --------------------------------------------------------
    frame_rate:   30    # 카메라 FPS

    track_buffer: 60    # Lost 트랙 유지 프레임 수 (30fps 기준 2초)
                        # 이 프레임 동안 Kalman으로 위치 예측 유지

    track_thresh: 0.45  # 고신뢰도 detection 임계값 (1차 매칭 대상)
                        # 이 값 이상이면 고신뢰도로 분류

    high_thresh:  0.6   # 신규 트랙 생성 임계값
                        # detection score가 이 값 이상이어야 새 트랙 생성

    match_thresh: 0.95  # 1차 매칭 Mahalanobis cost 임계값
                        # chi2 정규화 기준, 1.0 = chi2 11.070 (5-DOF 95%)
                        # 0.85 → 0.95: 같은 트랙 ID를 더 오래 유지 (재매핑 빈도 감소)

    # --------------------------------------------------------
    # Kalman Filter 노이즈 가중치
    # 작을수록 해당 변수를 더 신뢰 (노이즈 작다고 가정)
    # 클수록 예측을 더 신뢰 (노이즈 크다고 가정)
    # --------------------------------------------------------
    std_weight_position: 0.1    # xy 위치 노이즈 (1/10, 0511 진동 완화 위해 2배 키움)
                                # 작게 하면 detection을 더 신뢰 → 진동 따라감

    std_weight_velocity: 0.0125 # xy 속도 노이즈 (1/80, 0511 진동 완화 위해 2배 키움)
                                # 크게 하면 속도 변화를 더 허용

    std_weight_depth:    0.07   # z (depth) 노이즈 가중치.
                                # [0525] z단위 버그 수정 반영해 재설정(0.5 -> 0.07).
                                #   수정 전: z 노이즈가 픽셀높이(h)에 비례 -> 0.5가 맞았음.
                                #   수정 후: z 노이즈가 depth(z) 자체에 비례(하한 500mm).
                                #     0.5면 1m에서 ±0.5m로 과도하게 둔감. 0.07 부근이 적절.
                                # ★ 시작값일 뿐, 실주행에서 맞춰야 함:
                                #   사람 정지+회전 시 spatial_z 시계열(viz_topdown) 관찰
                                #   -> 튀면(노이즈) 값 키우고, 응답 느리면 줄임.

    # --------------------------------------------------------
    # OwnerTracker 파라미터 (0508 수정 — max_lost_frames 대체)
    # --------------------------------------------------------
    grace_frames:         10    # Lost 후 재매핑까지 대기할 프레임 수
                                # ByteTrack 내부 복구를 이 동안 기다림

    max_reassign_dist_px: 300.0 # 재매핑 허용 최대 거리(px)
                                # 후보가 이보다 멀면 재매핑 거부 (다른 사람 방지)

    lost_reset_frames:    60    # 이 이상 lost면 옛 owner를 영구히 포기.
                                # 다음 callback에서 화면 중앙 nearest로 새 owner 재선정.
                                # track_buffer(60)와 동일 기본값 — ByteTrack이 lost 풀에서
                                # 잊은 직후 OwnerTracker도 옛 픽셀 위치 anchor 해제.

    # --------------------------------------------------------
    # Smoothing / outlier rejection (속도 기반)
    # --------------------------------------------------------
    max_speed_xy_mps:       2.0  # 좌우 최대 속도 (m/s). 걷는 사람 ~1.5, 여유 두고 2.0.
                                 # 측정이 이보다 빠르면 clip → 회전/배경 끼임 outlier 차단.
    max_speed_z_mps:        2.0  # 전후 최대 속도 (m/s). 같은 의미.
                                 # 사람이 진짜 빨리 다가올 때도 max 속도까지만 따라감.

    ema_alpha_xy:           0.6  # x, y 좌표 EMA 계수 (0~1)
                                 # [0525] 0.35 -> 0.6: 움직임 반응이 느려서 키움.
                                 # 1=필터없음, 0.6 = 새 측정 60% + 직전 40%.

    ema_alpha_z:            0.15 # depth 좌표 EMA 계수 (정적 폴백)
                                 # [0623] 0.4->0.25->0.15: 이동 중 depth 튐 더 잡으려 평활↑↑.
                                 # 더 빠르게: 값 키움(최대 1.0) / 떨리면: 값 줄임.

    # [0525] 동적 z 평활: 좌우 이동(화면 픽셀x 변화)이 클수록 z를 강하게 평활,
    #   정지 시 빠르게 반응. 이동 중 모션블러로 depth 출렁이는 걸 흡수.
    #   신호=bbox 중심 픽셀x 변화량(z 오염 무관). alpha_z = max-(min~max를 dpx/full 비율 보간).
    dyn_z_smooth:        true   # 동적 z 평활 on/off. false면 ema_alpha_z(정적) 사용.
    ema_alpha_z_min:     0.03   # [0623] 0.08->0.05->0.03: 빠른 좌우이동 시 더 강한 평활.
    ema_alpha_z_max:     0.15   # [0623] 0.40->0.25->0.15: 전후이동/정지 depth 튐↓↓.
                                #  (전후 이동은 픽셀x가 거의 안 변해 max쪽이 적용됨 → 여기 낮추는 게 핵심)
    dyn_z_px_full:       10.0   # [0623] 15->10: 더 작은 좌우움직임에도 강평활 진입.
                                # ↑ 줄이면 더 민감(작은 움직임에도 강평활), 키우면 둔감.

    # --------------------------------------------------------
    # 메트릭 로깅 (0524 추가, 동작 무관 / 로깅만)
    # --------------------------------------------------------
    metric_log_period:    150   # 이 프레임마다 [metrics] 요약 한 줄 출력.
                                # 30fps 기준 5초. 0으로 두면 요약 로그 끕.
                                # (hit/kf/lost 비율, id_switch/perma_lost/speed_cap 누적)
