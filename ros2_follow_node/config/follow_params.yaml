follow_node:
  ros__parameters:

    # --------------------------------------------------------
    # 동작 모드
    #   0 = 대기  (모든 출력 0)
    #   1 = 팔로우(yaw + 전후, Jackal 차동구동)
    #   2 = 고정  (yaw만, 제자리 회전으로 주인 정면 유지)
    # 런타임에 바꾸려면:
    #   ros2 topic pub /follow_mode std_msgs/Int32 "data: 1" -1
    # --------------------------------------------------------
    mode: 0

    # --------------------------------------------------------
    # 주인이 "있어야 하는" 위치 (카메라 좌표계, m)
    #   target_x : 좌우  (양수=오른쪽)
    #   target_y : 상하  (Jackal에선 미사용 — 틸트 서보가 처리)
    #   target_z : 전방거리
    # 기본: (0, 0, 2.0) = 화면 정면, 전방 2m
    # 런타임에 바꾸려면:
    #   ros2 topic pub /follow_target geometry_msgs/Vector3 "{x: 0.0, y: 0.0, z: 2.5}" -1
    # --------------------------------------------------------
    target_x: 0.0
    target_y: 0.0
    target_z: 2.0

    # --------------------------------------------------------
    # PID 게인 (yaw)  --- azimuth 오차 → angular.z
    # --------------------------------------------------------
    kp_yaw: 1.2
    ki_yaw: 0.0
    kd_yaw: 0.15

    # --------------------------------------------------------
    # PID 게인 (forward)  --- 전방거리 오차 → linear.x
    # --------------------------------------------------------
    kp_forward: 0.6
    ki_forward: 0.0
    kd_forward: 0.10

    # --------------------------------------------------------
    # 출력 제한 (Jackal 안전치, 데이터 수집 단계라 보수적으로)
    # --------------------------------------------------------
    max_yaw:     0.6   # rad/s
    max_forward: 0.4   # m/s
    max_reverse: 0.2   # m/s, 후진 더 보수적

    # --------------------------------------------------------
    # Deadzone (이 안이면 출력 0, hunting 방지)
    # --------------------------------------------------------
    deadzone_azimuth:  0.04   # rad ≈ 2.3°
    deadzone_distance: 0.10   # m

    # --------------------------------------------------------
    # 적분 windup 방지
    # --------------------------------------------------------
    i_clamp_yaw:     0.5
    i_clamp_forward: 0.3

    # --------------------------------------------------------
    # 안전: owner_pose가 이 시간 이상 안 오면 정지
    # --------------------------------------------------------
    owner_timeout_sec: 0.5
