# ============================================================================
#  gesture_params.yaml — gesture_node 파라미터 (코드 기본값과 일치 유지)
#  메뉴 트리 자체는 ros2_gesture_node/menu.py 의 build_menu() 참조.
# ============================================================================
gesture_node:
  ros__parameters:
    recognizer: mediapipe     # mediapipe | hagrid | mock
    #  mediapipe: 손 21랜드마크 → 방향 손동작(권총/쓰리건). ★py3.8~3.12 권장(3.14 X)
    #  mock     : /gesture_mock 으로 canonical 라벨 주입 (카메라 없이 테스트)
    #  hagrid   : (구) 방향 불가 — 호환용. model_path 필요.
    model_path: models/YOLOv10n_gestures.pt   # hagrid 전용
    conf_threshold: 0.5
    image_topic: /oak/rgb/image_raw     # oak_detector publish_rgb=true 필요
    idle_rate: 5.0            # Hz, IDLE 중 like 감시 주기 (부하 절감)
    menu_rate: 15.0           # Hz, 메뉴 중 인식 주기
    trigger_hold: 1.5         # s, 따봉 유지 → 메뉴 열림
    select_hold: 1.5          # s, 항목 유지 → 확정
    menu_timeout: 10.0        # s, 무입력 자동 취소
    dropout_tol: 0.4          # s, 인식 끊김 허용 (프레임 드랍 흡수)
    dist_step: 0.3            # m, 거리 1회 폭 (검지 상=멀리/하=가까이)
    bearing_step_deg: 8.0     # deg, 공전 1회 폭 (검지 좌=CCW/우=CW). 클수록 공전 빠름
    heading_step_deg: 15.0    # deg, 자전 1회 폭 (쓰리건 좌=CW/우=CCW)
    lift_step: 0.1            # m, 리프트 1회 폭 (검지 상=올림/하=내림)
    # 방향 부호: 실차에서 회전이 반대로 돌면 해당 값만 -1.0 으로 (메뉴/제어 안 건드림)
    orbit_sign: 1.0           # 공전: +1=검지 좌가 CCW
    spin_sign: 1.0            # 자전: +1=쓰리건 우가 CCW(좌=CW)

gesture_ui_node:
  ros__parameters:
    fullscreen: true          # LCD 전체화면 (개발 PC에선 false 권장)
    width: 1024
    height: 600
