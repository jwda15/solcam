# ============================================================================
#  gesture_params.yaml — gesture_node 파라미터 (코드 기본값과 일치 유지)
#  메뉴 트리 자체는 ros2_gesture_node/menu.py 의 build_menu() 참조.
# ============================================================================
gesture_node:
  ros__parameters:
    recognizer: hagrid        # hagrid | mock (mock: /gesture_mock 주입 테스트)
    # HaGRID 사전학습 YOLO (models/download.sh 로 다운로드).
    # ★실행 머신에서는 절대경로 권장 (예: /home/jetson/solcam/ros2_gesture_node/models/...)
    model_path: models/YOLOv10n_gestures.pt
    conf_threshold: 0.5       # 검출 신뢰도 문턱
    image_topic: /oak/rgb/image_raw     # oak_detector publish_rgb=true 필요
    idle_rate: 5.0            # Hz, IDLE 중 like 감시 주기 (부하 절감)
    menu_rate: 15.0           # Hz, 메뉴 중 인식 주기
    trigger_hold: 1.5         # s, 따봉 유지 → 메뉴 열림
    select_hold: 1.5          # s, 항목 유지 → 확정
    menu_timeout: 10.0        # s, 무입력 자동 취소
    dropout_tol: 0.4          # s, 인식 끊김 허용 (프레임 드랍 흡수)
    dist_step: 0.3            # m, 거리 조절 1회 폭
    bearing_step_deg: 8.0     # deg, 공전(방위각) 1회 폭 (CCW+, 실차 확인). 클수록 공전 빠름
    heading_step_deg: 15.0    # deg, 헤딩(Pan) 오프셋 1회 폭 (CCW+=좌, 실차 확인)
    lift_step: 0.1            # m, 리프트 조절 1회 폭

gesture_ui_node:
  ros__parameters:
    fullscreen: true          # LCD 전체화면 (개발 PC에선 false 권장)
    width: 1024
    height: 600
